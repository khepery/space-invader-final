<!DOCTYPE html>
<html>
<head>
    <title>Economics Space Invaders - Improved</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            margin: auto;
            background: #000;
            overflow: hidden;
        }
        #settingsScreen, #gameCanvas, #quizContainer, #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 64, 0.9);
            padding: 20px;
            border: 2px solid #0ff;
            border-radius: 10px;
            color: #0ff;
            text-align: center;
            z-index: 3;
            max-height: 90%;
            overflow-y: auto;
        }
        #settingsScreen {
            display: block;
            background: rgba(0, 0, 0, 0.9);
        }
        #settingsScreen h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .quiz-option {
            margin: 10px;
            padding: 10px 20px;
            background: #222;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            border-radius: 5px;
            width: 80%;
            font-size: 14px;
            text-shadow: 0 0 5px #0ff;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .quiz-option:hover {
            background: #333;
            box-shadow: 0 0 10px #0ff;
        }
        #questionForm {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>
        
        <!-- Settings Screen -->
        <div id="settingsScreen">
            <h2>Question Settings</h2>
            <div class="upload-section">
                <h3>Import Questions From:</h3>
                <button id="downloadExcelTemplateBtn" class="quiz-option">Download Excel Template</button>
                <button id="importExcelBtn" class="quiz-option">Import Excel File (.xlsx)</button>
                <button id="addQuestionSetBtn" class="quiz-option">Add New Set Manually</button>
                <p class="import-tip">
                    Excel Format: Each row should have the question, 4 options, and the correct answer (1-4)
                </p>
            </div>
            <div id="questionList" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button id="startGameBtn" class="quiz-option">Start Game</button>
        </div>

        <!-- Add Question Form -->
        <div id="questionForm">
            <h3>Add Question</h3>
            <textarea id="newQuestionText" placeholder="Enter question" rows="3" style="width: 90%; margin: 10px;"></textarea>
            <div id="newOptions">
                <input type="text" placeholder="Option 1" class="option-input" style="width: 90%; margin: 5px;"><br>
                <input type="text" placeholder="Option 2" class="option-input" style="width: 90%; margin: 5px;"><br>
                <input type="text" placeholder="Option 3" class="option-input" style="width: 90%; margin: 5px;"><br>
                <input type="text" placeholder="Option 4" class="option-input" style="width: 90%; margin: 5px;"><br>
            </div>
            <select id="correctAnswer" style="margin: 10px; width: 95%;">
                <option value="0">Option 1 is correct</option>
                <option value="1">Option 2 is correct</option>
                <option value="2">Option 3 is correct</option>
                <option value="3">Option 4 is correct</option>
            </select>
            <button id="saveNewQuestionBtn" class="quiz-option">Save Question</button>
            <button id="cancelNewQuestionBtn" class="quiz-option">Cancel</button>
        </div>

        <!-- Quiz Container -->
        <div id="quizContainer">
            <h2 id="questionText"></h2>
            <div id="options"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen">
            <h2>Game Over!</h2>
            <p>Your score: <span id="finalScore">0</span></p>
            <button id="restartButton" class="quiz-option">Restart Game</button>
        </div>
    </div>

    <script>
        const settingsScreen = document.getElementById('settingsScreen');
        const questionList = document.getElementById('questionList');
        const questionForm = document.getElementById('questionForm');
        const newQuestionText = document.getElementById('newQuestionText');
        const newOptions = document.querySelectorAll('.option-input');
        const correctAnswer = document.getElementById('correctAnswer');
        const gameCanvas = document.getElementById('gameCanvas');
        const quizContainer = document.getElementById('quizContainer');
        const questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Excel Template Download
        function downloadExcelTemplate() {
            const template = [
                ['Question', 'Option 1', 'Option 2', 'Option 3', 'Option 4', 'Correct Answer (1-4)'],
                ['What is an example question?', 'First option', 'Second option', 'Third option', 'Fourth option', '2']
            ];

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(template);
            XLSX.utils.book_append_sheet(wb, ws, "Questions");
            XLSX.writeFile(wb, 'question_template.xlsx');
        }

        // Excel Import Handling
        function handleExcelImport(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                rows.shift(); // Remove header row

                const newQuestions = rows.map(row => ({
                    question: row[0],
                    options: [row[1], row[2], row[3], row[4]],
                    correct: parseInt(row[5]) - 1
                }));

                if (newQuestions.length > 0) {
                    questions.push(...newQuestions);
                    displayQuestionList();
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function displayQuestionList() {
            questionList.innerHTML = '';
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.innerHTML = `${index + 1}. ${q.question}`;
                questionList.appendChild(div);
            });
        }

        // Add Question Manually
        document.getElementById('addQuestionSetBtn').addEventListener('click', () => {
            questionForm.style.display = 'block';
            settingsScreen.style.display = 'none';
        });

        document.getElementById('cancelNewQuestionBtn').addEventListener('click', () => {
            questionForm.style.display = 'none';
            settingsScreen.style.display = 'block';
        });

        document.getElementById('saveNewQuestionBtn').addEventListener('click', () => {
            const question = newQuestionText.value;
            const options = Array.from(newOptions).map(input => input.value);
            const correct = parseInt(correctAnswer.value);

            if (question && options.every(opt => opt.trim() !== '') && !isNaN(correct)) {
                questions.push({
                    question: question,
                    options: options,
                    correct: correct
                });
                
                // Clear form
                newQuestionText.value = '';
                newOptions.forEach(input => input.value = '');
                correctAnswer.value = '0';
                questionForm.style.display = 'none';
                settingsScreen.style.display = 'block';
                displayQuestionList();
            } else {
                alert('Please fill in all fields correctly.');
            }
        });

        // Event Listeners
        document.getElementById('downloadExcelTemplateBtn').addEventListener('click', downloadExcelTemplate);
        document.getElementById('importExcelBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx';
            input.onchange = handleExcelImport;
            input.click();
        });
        document.getElementById('startGameBtn').addEventListener('click', () => {
            if (questions.length === 0) {
                alert('Please add at least one question to start the game.');
                return;
            }
            settingsScreen.style.display = 'none';
            gameCanvas.style.display = 'block';
            quizContainer.style.display = 'block';
            currentQuestionIndex = 0;
            score = 0;
            displayQuestion();
        });

        function displayQuestion() {
            if (currentQuestionIndex >= questions.length) {
                endGame();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            quizContainer.style.display = 'block';
            document.getElementById('questionText').innerText = currentQuestion.question;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.innerText = option;
                btn.addEventListener('click', () => checkAnswer(index));
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex) {
            const currentQuestion = questions[currentQuestionIndex];
            if (selectedIndex === currentQuestion.correct) {
                score++;
            }
            currentQuestionIndex++;
            displayQuestion();
        }

        function endGame() {
            quizContainer.style.display = 'none';
            gameCanvas.style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }

        document.getElementById('restartButton').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            settingsScreen.style.display = 'block';
        });
    </script>
</body>
</html>
